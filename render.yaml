services:
  - type: web
    name: elo-arc
    env: node
    region: oregon
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install
    startCommand: node server/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_RISING
        sync: false
      - key: STRIPE_PRICE_ELITE
        sync: false
      - key: STRIPE_PRICE_ARC_MASTER
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
