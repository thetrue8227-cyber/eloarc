version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: eloarc
      POSTGRES_USER: eloarc
      POSTGRES_PASSWORD: eloarc
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eloarc"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://eloarc:eloarc@db:5432/eloarc
      NODE_ENV: development
      PORT: 4000
      JWT_SECRET: dev-secret-change-in-production
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:4000
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server

volumes:
  pg_data:
